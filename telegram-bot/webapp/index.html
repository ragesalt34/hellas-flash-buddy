    <!-- Rubik = display (lat/cyr), Onest = body (lat/cyr), Manrope = Greek
         fallback for both (Rubik & Onest ship no Greek glyphs). Greek subset of
         Manrope loads on demand; its lat/cyr subsets never download. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;600;700;800&family=Onest:wght@500;600;700;800&family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Kill any stale service worker + caches left by an earlier version of the
         site (the old Lovable app registered one). A dead SW keeps serving an
         outdated app shell that references CSS/JS hashes which no longer exist,
         producing an unstyled page that survives hard-refresh. This app ships no
         SW, so unregistering is always safe; reload once after cleanup. -->
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          if (!regs.length) return;
          Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
            if (window.caches && caches.keys) {
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }).finally(function () { location.reload(); });
            } else {
              location.reload();
            }
          });
        }).catch(function () {});
      })();
    </script>

    <!-- Wake the API (Render free tier sleeps after idle) as early as possible —
