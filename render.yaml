services:
  - type: web
    name: hellas-flash-buddy-bot
    runtime: docker
    plan: free
    rootDir: telegram-bot
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/me
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "3000"
      - key: API_ONLY
        value: "true"
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GOOGLE_TTS_API_KEY
        sync: false
      - key: APP_SECRET
        sync: false
